<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Seu CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
    <form class="form">
        <h1>Acessar</h1>

        <label>E-mail</label>
        <input type="email" id="loginEmail" class="form-control" placeholder="Informe seu E-mail">

        <label class="mt-2">Senha</label>
        <input type="password" id="loginSenha" class="form-control" placeholder="Informe sua Senha">

        <button class="btn btn-primary mt-3" type="button" onclick="acessar()">Entrar</button>

        <p class="mt-3 text-muted">&copy; 2025–2027</p>
    </form>
</div>

<script src="main.js"></script>
</body>
</html>
